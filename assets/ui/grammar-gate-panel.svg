<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 240" role="img" aria-labelledby="title desc">
  <title id="title">Grammar gate panel</title>
  <desc id="desc">A Bright Quest grammar checkpoint panel with a notebook, check marks, word cards, and a chalk route.</desc>
  <defs>
    <linearGradient id="paper" x1="18" x2="394" y1="20" y2="224" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".52" stop-color="#EAF8FF"/>
      <stop offset="1" stop-color="#FFF1D0"/>
    </linearGradient>
    <linearGradient id="blue" x1="62" x2="342" y1="52" y2="198" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17217C"/>
      <stop offset=".52" stop-color="#176BFF"/>
      <stop offset="1" stop-color="#22C7D9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#FFF47B"/>
      <stop offset="1" stop-color="#FF9D22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="9" flood-color="#09205C" flood-opacity=".20"/>
    </filter>
  </defs>
  <rect x="10" y="12" width="400" height="216" rx="38" fill="url(#paper)"/>
  <path d="M36 190c58-30 111-40 159-31 50 10 80 37 130 29 32-5 56-20 78-38" fill="none" stroke="#FFFFFF" stroke-width="10" stroke-linecap="round" stroke-dasharray="1 24"/>
  <g filter="url(#shadow)">
    <rect x="48" y="52" width="126" height="126" rx="26" fill="#FFFFFF"/>
    <path d="M75 92h66M75 122h74M75 152h48" stroke="#D8E7FF" stroke-width="11" stroke-linecap="round"/>
    <path d="M84 150l24-23 20 16 34-41" fill="none" stroke="#21C46B" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="214" y="50" width="126" height="50" rx="18" fill="url(#blue)"/>
    <rect x="196" y="118" width="156" height="50" rx="18" fill="#FFFFFF"/>
    <path d="M234 81h64M224 149h84" stroke="#D8E7FF" stroke-width="10" stroke-linecap="round"/>
    <path d="M345 46l9 25 27 1-22 16 8 26-22-16-22 16 8-26-22-16 27-1z" fill="url(#gold)"/>
  </g>
</svg>
