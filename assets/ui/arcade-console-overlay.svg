<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" role="img" aria-labelledby="title desc">
  <title id="title">Bright Quest arcade console overlay</title>
  <desc id="desc">A polished reward-game scene frame with console panels, route lights, stars, and game-world details.</desc>
  <defs>
    <linearGradient id="sky" x1="0" x2="960" y1="0" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#EAF9FF"/>
      <stop offset=".45" stop-color="#75DBFF"/>
      <stop offset="1" stop-color="#1EB7D0"/>
    </linearGradient>
    <linearGradient id="panel" x1="90" x2="854" y1="70" y2="520" gradientUnits="userSpaceOnUse">
