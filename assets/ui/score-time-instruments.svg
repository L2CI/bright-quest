<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-labelledby="title desc">
  <title id="title">Score and time instruments</title>
  <desc id="desc">A compact Bright Quest instrument panel with star meter, timer dial, and progress lights.</desc>
  <defs>
    <linearGradient id="panel" x1="18" x2="302" y1="18" y2="162" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF"/>
      <stop offset=".52" stop-color="#EAF8FF"/>
      <stop offset="1" stop-color="#FFF3C7"/>
    </linearGradient>
    <linearGradient id="blue" x1="44" x2="266" y1="40" y2="152" gradientUnits="userSpaceOnUse">
      <stop stop-color="#17217C"/>
      <stop offset=".52" stop-color="#176BFF"/>
      <stop offset="1" stop-color="#22C7D9"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#FFF47B"/>
      <stop offset="1" stop-color="#FF9D22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#09205C" flood-opacity=".20"/>
    </filter>
  </defs>
  <rect x="8" y="10" width="304" height="160" rx="34" fill="url(#panel)"/>
  <g filter="url(#shadow)">
    <circle cx="88" cy="88" r="48" fill="#FFFFFF"/>
    <path d="M88 48a40 40 0 0 1 38 52" fill="none" stroke="#21C46B" stroke-width="14" stroke-linecap="round"/>
    <path d="M88 60v31l22 15" fill="none" stroke="#17217C" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  <g filter="url(#shadow)">
    <rect x="158" y="44" width="102" height="88" rx="24" fill="url(#blue)"/>
    <path d="M209 61l11 30 32 1-26 19 10 31-27-19-27 19 10-31-26-19 32-1z" fill="url(#gold)"/>
  </g>
  <path d="M39 145h242" stroke="#D7E7FF" stroke-width="8" stroke-linecap="round"/>
  <path d="M39 145h154" stroke="#22C7D9" stroke-width="8" stroke-linecap="round"/>
  <circle cx="226" cy="145" r="8" fill="#F25596"/>
  <circle cx="254" cy="145" r="8" fill="#FFD23C"/>
</svg>
